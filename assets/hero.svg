<svg width="760" height="300" viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Fira Code', monospace">
  <defs>
    <clipPath id="round">
      <rect x="0" y="0" width="760" height="300" rx="10" ry="10"/>
    </clipPath>
    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#7cc86a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7cc86a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#round)">
    <rect width="760" height="300" fill="#0f120d"/>
    <rect width="760" height="300" fill="url(#glow)"/>

    <rect width="760" height="40" fill="#14170f"/>
    <line x1="0" y1="40" x2="760" y2="40" stroke="#2a2f26" stroke-width="1"/>
    <circle cx="24" cy="20" r="5" fill="#4a4f42"/>
    <circle cx="42" cy="20" r="5" fill="#4a4f42"/>
    <circle cx="60" cy="20" r="5" fill="#4a4f42"/>
    <text x="86" y="24" font-size="12" fill="#5c6354">kasam — whoami</text>

    <g font-size="14">
      <text x="28" y="78" fill="#5c6354">$ whoami</text>

      <text x="28" y="116" font-size="26" font-weight="600" fill="#e8ecdf">Kasam Thapa Magar</text>

      <text x="28" y="146" font-style="italic" fill="#8a9180">
        Not the smartest person in the room — just the one who keeps showing up.
      </text>

      <text x="28" y="184" fill="#5c6354">$ cat role.txt</text>
      <text x="28" y="208">
        <tspan fill="#7cc86a">full stack developer</tspan><tspan fill="#5c6354"> · </tspan><tspan fill="#7cc86a">AI builder</tspan><tspan fill="#5c6354"> · </tspan><tspan fill="#e0a458">Kathmandu, Nepal</tspan>
      </text>

      <text x="28" y="246" fill="#5c6354">$ cat focus.txt</text>
      <text x="28" y="270" fill="#c9d1c4">
        building AI-powered developer tools · going deep on RAG pipelines
      </text>
    </g>
  </g>

  <rect x="0.5" y="0.5" width="759" height="299" rx="10" ry="10" fill="none" stroke="#2a2f26" stroke-width="1"/>
</svg>
